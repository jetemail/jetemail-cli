name: Release

# Triggered when a version tag (e.g. v0.1.0) is pushed. Builds a release
# binary for each supported target, archives it with the LICENSE files and
# README, and uploads everything to a GitHub Release.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: jetemail

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            ext: .exe

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install `cross` (Linux only)
        if: matrix.cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Build
        shell: bash
        run: |
          if [[ "${{ matrix.cross }}" == "true" ]]; then
            cross build --release --locked --target ${{ matrix.target }}
          else
            cargo build --release --locked --target ${{ matrix.target }}
          fi

      - name: Stage artifacts
        shell: bash
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          version="${tag#v}"
          name="${BIN_NAME}-${version}-${{ matrix.target }}"
          bin="${BIN_NAME}${{ matrix.ext }}"
          src="target/${{ matrix.target }}/release/${bin}"
          mkdir -p dist

          # 1. Bundled archive: binary + README + LICENSE files.
          mkdir -p "$name"
          cp "$src" "$name/"
          cp README.md LICENSE-MIT LICENSE-APACHE "$name/"
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            7z a "dist/${name}.zip" "$name" > /dev/null
          else
            tar -czf "dist/${name}.tar.gz" "$name"
          fi
          rm -rf "$name"

          # 2. Bare binary, versioned filename, no archive — for users who just
          #    want a direct download. On Windows this lands as a `.exe`; on
          #    Linux/macOS it's the raw executable they can `chmod +x` and run.
          cp "$src" "dist/${name}${{ matrix.ext }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*

  publish-brew:
    name: Publish Homebrew formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Render formula and push to tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          base="https://github.com/jetemail/jetemail-cli/releases/download/${TAG}"
          mac_arm="jetemail-${version}-aarch64-apple-darwin.tar.gz"
          linux_x64="jetemail-${version}-x86_64-unknown-linux-gnu.tar.gz"

          mkdir hashes && cd hashes
          curl -fsSL -O "${base}/${mac_arm}"
          curl -fsSL -O "${base}/${linux_x64}"
          mac_arm_sha=$(sha256sum "${mac_arm}" | awk '{print $1}')
          linux_x64_sha=$(sha256sum "${linux_x64}" | awk '{print $1}')
          cd ..

          git clone "https://x-access-token:${GH_TOKEN}@github.com/jetemail/homebrew-cli.git" tap
          mkdir -p tap/Formula
          cat > tap/Formula/jetemail.rb <<EOF
          class Jetemail < Formula
            desc "Official CLI for JetEmail"
            homepage "https://github.com/jetemail/jetemail-cli"
            version "${version}"
            license "MIT OR Apache-2.0"

            on_macos do
              on_arm do
                url "${base}/${mac_arm}"
                sha256 "${mac_arm_sha}"
              end
            end

            on_linux do
              on_intel do
                url "${base}/${linux_x64}"
                sha256 "${linux_x64_sha}"
              end
            end

            def install
              bin.install "jetemail"
            end

            test do
              assert_match "jetemail", shell_output("#{bin}/jetemail --version")
            end
          end
          EOF

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/jetemail.rb
          if git diff --cached --quiet; then
            echo "Formula unchanged — nothing to commit."
            exit 0
          fi
          git commit -m "jetemail ${version}"
          git push origin HEAD:main

  cargo-publish:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true
